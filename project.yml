name: SimDeeplink

options:
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  SimctlCore:
    path: .

targets:
  SimDeeplink:
    type: application
    platform: macOS
    sources:
      - path: SimDeeplink
    dependencies:
      - package: SimctlCore
        product: SimctlCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.botirjon.SimDeeplink
        PRODUCT_NAME: SimDeeplink
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_ENTITLEMENTS: SimDeeplink/SimDeeplink.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
